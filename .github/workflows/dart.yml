name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout الشيفرة
        uses: actions/checkout@v4

      - name: تثبيت Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.1'  # عدّل للإصدار الذي تستخدمه

      - name: تثبيت الحزم
        run: flutter pub get

      - name: تحليل المشروع
        run: flutter analyze

      - name: تشغيل الاختبارات
        run: flutter test

      - name: بناء ملف APK
        run: flutter build apk --release

      - name: رفع APK كأداة قابلة للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
