name: fuel_delivery_app
description: "Fuel delivery application built with Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.2
  cloud_firestore: 5.4.4
  google_maps_flutter: ^2.10.0
  location: ^7.0.1
  flutter_stripe: ^11.4.0
  http: ^1.3.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^4.0.0  # ✅ هنا مكانها الصحيح

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/applogo.png"

flutter:
  assets:
    - assets/logo.png
    - assets/stripelogo.png
  uses-material-design: true
